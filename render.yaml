services:
  - type: web
    name: server-beckend
    runtime: node
    region: ohio
    plan: free
    branch: royalshield-v1.0.2-unified
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_INTERNAL_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DID_API_KEY
        sync: false
