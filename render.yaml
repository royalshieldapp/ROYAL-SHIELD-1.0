services:
  - type: web
    name: server-beckend
    runtime: python
    region: ohio
    plan: free
    rootDir: royal_shield_backend_unified
    buildCommand: pip install -r requirements-render.txt
    startCommand: python -m uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FILE
        value: logs/royal_shield_backend.log
      - key: DATABASE_URL
        fromDatabase:
          name: royal-shield-postgres
          property: connectionString
      - key: API_INTERNAL_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DID_API_KEY
        sync: false

databases:
  - name: royal-shield-postgres
    databaseName: royal_shield_risk_db
    user: royal_shield
